<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link rel="preload" href="fonts/MuseoSansCyrl_0.otf" as="font" type="font/otf" crossorigin>
<link rel="preload" href="fonts/MuseoSansCyrl_2.otf" as="font" type="font/otf" crossorigin>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Сергей Прусс</title>
<link rel="stylesheet" href="styles/site.css?v=15">
<link rel="stylesheet" href="styles/site-components.css?v=4">
<script src="scripts/analytics.js?v=2" defer></script>
<meta name="robots" content="noindex">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
.e404-num {
  font-family: 'Museo Sans', sans-serif;
  font-weight: 700;
  font-size: clamp(5rem, 15vw, 10rem);
  line-height: 1;
  letter-spacing: -.04em;
  color: var(--ink);
  position: relative;
  display: inline-block;
  animation: glitch 6s infinite;
}
.e404-num::before,
.e404-num::after {
  content: '404';
  position: absolute;
  inset: 0;
}
.e404-num::before {
  color: var(--accent);
  clip-path: polygon(0 0, 100% 0, 100% 38%, 0 38%);
  animation: glitch-a 6s infinite;
}
.e404-num::after {
  color: #4a8ff5;
  clip-path: polygon(0 64%, 100% 64%, 100% 100%, 0 100%);
  animation: glitch-b 6s infinite;
}
@keyframes glitch {
  0%,90%,100% { transform: none }
  91% { transform: skewX(-3deg) }
  92% { transform: skewX(2deg) }
  93% { transform: none }
}
@keyframes glitch-a {
  0%,90%,100% { transform: none; opacity: 0 }
  91% { transform: translate(-4px, -2px); opacity: 1 }
  92% { transform: translate(4px, 2px); opacity: 1 }
  93% { opacity: 0 }
}
@keyframes glitch-b {
  0%,90%,100% { transform: none; opacity: 0 }
  91% { transform: translate(4px, 2px); opacity: 1 }
  92% { transform: translate(-4px, -2px); opacity: 1 }
  93% { opacity: 0 }
}
</style>
</head>
<body>

<div id="site-header"></div>

<div class="wrap">
  <div class="post-header">
    <p class="post-date">Страница не найдена</p>
    <div class="e404-num">404</div>
  </div>

  <div class="post-body">
    <p>Эта страница ушла в операционку и не вернулась. Хорошие лидеры знают, куда идти дальше.</p>
    <p><a href="/blog.html">Читать блог</a> · <a href="/">На главную</a></p>
  </div>
</div>

<div id="site-footer"></div>

<script src="components.js"></script>
</body>
</html>
