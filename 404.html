<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Сергей Прусс</title>
<meta name="robots" content="noindex">
<link rel="preload" href="fonts/MuseoSansCyrl_0.otf" as="font" type="font/otf" crossorigin>
<link rel="preload" href="fonts/MuseoSansCyrl_2.otf" as="font" type="font/otf" crossorigin>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<style>
@font-face{font-family:'Museo Sans';src:url('fonts/MuseoSansCyrl_0.otf') format('opentype');font-weight:300;font-display:swap}
@font-face{font-family:'Museo Sans';src:url('fonts/MuseoSansCyrl_2.otf') format('opentype');font-weight:700;font-display:swap}

*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#1a1a1a;
  --ink:#e8e8e8;
  --ink-soft:#888;
  --accent:#c8743a;
  --line:#2e2e2e;
}

html,body{height:100%;overflow:hidden}

body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Museo Sans',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

canvas{
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.5;
}

.content{
  position:relative;
  z-index:10;
  text-align:center;
  padding:2rem;
  animation:fadeUp .8s cubic-bezier(.16,1,.3,1) both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:translateY(0)}
}

.num{
  font-size:clamp(7rem,20vw,16rem);
  font-weight:700;
  line-height:1;
  color:var(--ink);
  position:relative;
  display:inline-block;
  animation:glitch 4s infinite;
  letter-spacing:-.04em;
}

.num::before,
.num::after{
  content:'404';
  position:absolute;
  inset:0;
  opacity:.8;
}
.num::before{
  color:var(--accent);
  clip-path:polygon(0 0,100% 0,100% 35%,0 35%);
  animation:glitch-top 4s infinite;
}
.num::after{
  color:#4a9eff;
  clip-path:polygon(0 65%,100% 65%,100% 100%,0 100%);
  animation:glitch-bottom 4s infinite;
}

@keyframes glitch{
  0%,95%,100%{transform:none}
  96%{transform:skewX(-2deg)}
  97%{transform:skewX(2deg)}
  98%{transform:skewX(-1deg)}
}
@keyframes glitch-top{
  0%,95%,100%{transform:none;opacity:0}
  96%{transform:translate(-3px,-2px);opacity:.9}
  97%{transform:translate(3px,2px);opacity:.9}
  98%{transform:translate(-2px,0);opacity:.9}
  99%{opacity:0}
}
@keyframes glitch-bottom{
  0%,95%,100%{transform:none;opacity:0}
  96%{transform:translate(3px,2px);opacity:.9}
  97%{transform:translate(-3px,-2px);opacity:.9}
  98%{transform:translate(2px,0);opacity:.9}
  99%{opacity:0}
}

.label{
  font-size:.7rem;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--ink-soft);
  margin-top:.5rem;
  animation:fadeUp .8s .1s cubic-bezier(.16,1,.3,1) both;
}

.message{
  font-size:clamp(1rem,3vw,1.4rem);
  font-weight:700;
  margin-top:2rem;
  line-height:1.3;
  animation:fadeUp .8s .2s cubic-bezier(.16,1,.3,1) both;
}

.sub{
  font-size:.95rem;
  color:var(--ink-soft);
  margin-top:.75rem;
  line-height:1.6;
  font-weight:300;
  animation:fadeUp .8s .3s cubic-bezier(.16,1,.3,1) both;
}

.links{
  display:flex;
  gap:1rem;
  justify-content:center;
  margin-top:2.5rem;
  flex-wrap:wrap;
  animation:fadeUp .8s .4s cubic-bezier(.16,1,.3,1) both;
}

.btn{
  font-family:'Museo Sans',sans-serif;
  font-size:.75rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  text-decoration:none;
  padding:10px 22px;
  border-radius:999px;
  transition:all .2s;
  font-weight:700;
}

.btn-primary{
  background:var(--accent);
  color:#fff;
}
.btn-primary:hover{
  background:#d4803f;
  transform:translateY(-2px);
}

.btn-ghost{
  border:1px solid var(--line);
  color:var(--ink-soft);
}
.btn-ghost:hover{
  border-color:var(--ink-soft);
  color:var(--ink);
  transform:translateY(-2px);
}

.logo{
  position:fixed;
  top:28px;
  left:28px;
  font-weight:700;
  font-size:1rem;
  color:var(--ink);
  text-decoration:none;
  opacity:.6;
  transition:opacity .2s;
  z-index:20;
}
.logo:hover{opacity:1}
</style>
</head>
<body>
<a class="logo" href="/">Сергей Прусс</a>
<canvas id="c"></canvas>

<div class="content">
  <div class="num">404</div>
  <p class="label">Страница не найдена</p>
  <p class="message">Эта страница ушла в операционку<br>и не вернулась.</p>
  <p class="sub">Но хорошие лидеры знают, куда идти дальше.</p>
  <div class="links">
    <a class="btn btn-primary" href="/blog.html">Читать блог</a>
    <a class="btn btn-ghost" href="/">На главную</a>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, particles, mouse = {x: -1000, y: -1000};

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function rand(a, b){ return a + Math.random() * (b - a) }

function createParticles(){
  particles = Array.from({length: 80}, () => ({
    x: rand(0, W),
    y: rand(0, H),
    r: rand(1, 2.5),
    vx: rand(-.3, .3),
    vy: rand(-.4, -.1),
    alpha: rand(.2, .6),
    life: rand(0, 1),
    speed: rand(.003, .007),
  }));
}

function drawParticles(){
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => {
    p.life += p.speed;
    if(p.life > 1){ p.life = 0; p.x = rand(0, W); p.y = H + 10; }

    // Mouse repulsion
    const dx = p.x - mouse.x, dy = p.y - mouse.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(dist < 120){
      const force = (120 - dist) / 120 * .4;
      p.x += dx / dist * force;
      p.y += dy / dist * force;
    }

    p.x += p.vx;
    p.y += p.vy;

    const a = p.alpha * Math.sin(p.life * Math.PI);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,116,58,${a})`;
    ctx.fill();
  });

  // Draw lines between close particles
  for(let i = 0; i < particles.length; i++){
    for(let j = i+1; j < particles.length; j++){
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if(d < 100){
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(200,116,58,${.15 * (1 - d/100)})`;
        ctx.lineWidth = .5;
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(drawParticles);
}

window.addEventListener('resize', () => { resize(); createParticles(); });
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mouseleave', () => { mouse.x = -1000; mouse.y = -1000; });

resize();
createParticles();
drawParticles();
</script>
</body>
</html>
