<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link rel="preload" href="fonts/MuseoSansCyrl_0.otf" as="font" type="font/otf" crossorigin>
<link rel="preload" href="fonts/MuseoSansCyrl_2.otf" as="font" type="font/otf" crossorigin>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Сергей Прусс</title>
<link rel="stylesheet" href="styles/site.css?v=15">
<link rel="stylesheet" href="styles/site-components.css?v=4">
<script src="scripts/analytics.js?v=2" defer></script>
<meta name="robots" content="noindex">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
canvas#particles{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  opacity:.35;
}
.wrap{position:relative;z-index:1}

.page-404{
  padding:80px 0 100px;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:0;
}

.num-404{
  font-family:'Museo Sans',sans-serif;
  font-weight:700;
  font-size:clamp(6rem,18vw,13rem);
  line-height:1;
  color:var(--ink);
  position:relative;
  display:inline-block;
  letter-spacing:-.04em;
  animation:glitch 5s infinite;
  margin-bottom:8px;
}
.num-404::before,
.num-404::after{
  content:'404';
  position:absolute;
  inset:0;
}
.num-404::before{
  color:var(--accent);
  clip-path:polygon(0 0,100% 0,100% 38%,0 38%);
  animation:glitch-a 5s infinite;
}
.num-404::after{
  color:#4a8ff5;
  clip-path:polygon(0 62%,100% 62%,100% 100%,0 100%);
  animation:glitch-b 5s infinite;
}

@keyframes glitch{
  0%,92%,100%{transform:none}
  93%{transform:skewX(-3deg)}
  94%{transform:skewX(2deg)}
  95%{transform:none}
}
@keyframes glitch-a{
  0%,92%,100%{transform:none;opacity:0}
  93%{transform:translate(-4px,-2px);opacity:1}
  94%{transform:translate(4px,2px);opacity:1}
  95%{transform:translate(-2px,0);opacity:1}
  96%{opacity:0}
}
@keyframes glitch-b{
  0%,92%,100%{transform:none;opacity:0}
  93%{transform:translate(4px,2px);opacity:1}
  94%{transform:translate(-4px,-2px);opacity:1}
  95%{transform:translate(2px,0);opacity:1}
  96%{opacity:0}
}

.err-label{
  font-size:.7rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--ink-soft);
  margin-bottom:28px;
}

.page-404 h1{
  font-family:'Museo Sans',sans-serif;
  font-weight:700;
  font-size:clamp(1.4rem,4vw,2.2rem);
  line-height:1.25;
  margin-bottom:16px;
  color:var(--ink);
}

.page-404 .sub{
  font-size:1rem;
  color:var(--ink-soft);
  line-height:1.7;
  max-width:480px;
  margin-bottom:40px;
}

.err-links{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div id="site-header"></div>

<div class="wrap">
  <div class="page-404">
    <div class="num-404">404</div>
    <p class="err-label">Страница не найдена</p>
    <h1>Эта страница ушла<br>в операционку и не вернулась.</h1>
    <p class="sub">Но хорошие лидеры знают, куда идти дальше. Возможно, вы найдёте нужное в блоге — или просто вернитесь на главную.</p>
    <div class="err-links">
      <a href="/blog.html" class="btn">Читать блог <span class="btn-arrow" aria-hidden="true">→</span></a>
      <a href="/" class="post-date-link" style="align-self:center;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;">На главную</a>
    </div>
  </div>
</div>

<div id="site-footer"></div>

<script src="components.js"></script>
<script>
(function(){
  var canvas = document.getElementById('particles');
  var ctx = canvas.getContext('2d');
  var W, H, pts, mouse = {x:-9999,y:-9999};
  var accentR=200,accentG=116,accentB=58;

  function resize(){ W=canvas.width=innerWidth; H=canvas.height=innerHeight; }

  function rand(a,b){ return a+Math.random()*(b-a); }

  function init(){
    pts = Array.from({length:60},function(){
      return {x:rand(0,W),y:rand(0,H),vx:rand(-.25,.25),vy:rand(-.35,-.08),r:rand(1,2.2),life:rand(0,1),spd:rand(.004,.008),a:rand(.15,.5)};
    });
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(function(p){
      p.life+=p.spd;
      if(p.life>=1){p.life=0;p.x=rand(0,W);p.y=H+8;}
      var dx=p.x-mouse.x,dy=p.y-mouse.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<130){var f=(130-dist)/130*.5;p.x+=dx/dist*f;p.y+=dy/dist*f;}
      p.x+=p.vx;p.y+=p.vy;
      var alpha=p.a*Math.sin(p.life*Math.PI);
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba('+accentR+','+accentG+','+accentB+','+alpha+')';
      ctx.fill();
    });
    for(var i=0;i<pts.length;i++){
      for(var j=i+1;j<pts.length;j++){
        var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<90){
          ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle='rgba('+accentR+','+accentG+','+accentB+','+(0.12*(1-d/90))+')';
          ctx.lineWidth=.5;ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }

  addEventListener('resize',function(){resize();init();});
  addEventListener('mousemove',function(e){mouse.x=e.clientX;mouse.y=e.clientY;});
  addEventListener('mouseleave',function(){mouse.x=-9999;mouse.y=-9999;});
  resize();init();draw();
})();
</script>
</body>
</html>
