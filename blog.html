<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Блог — Сергей Прусс</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Spectral:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>

  :root {
    --bg: #141210;
    --ink: #e8e4de;
    --ink-soft: #8a8480;
    --accent: #d4785a;
    --line: #2a2724;
    --max: 680px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  a, button { cursor: pointer; }
  html { font-size: 17px; scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Spectral', Georgia, serif;
    font-weight: 300;
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: var(--max); margin: 0 auto; padding: 0 24px; }

  /* NAV */
  nav { padding: 28px 0 0; opacity: 0; animation: fadeUp .6s ease .1s forwards; }
  nav .wrap { display: flex; justify-content: space-between; align-items: center; }
  .logo { text-decoration: none; display: flex; flex-direction: column; gap: 2px; }
  .logo-name { font-family: 'Syne', sans-serif; font-size: 1.35rem; font-weight: 800; letter-spacing: -.01em; color: var(--ink); line-height: 1; transition: color .2s; }
  .logo:hover .logo-name { color: var(--accent); }
  .logo-sub { font-size: .58rem; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-soft); font-family: 'Spectral', serif; font-weight: 300; }
  .nav-right { display: flex; gap: 24px; align-items: center; }
  nav a.nav-link { font-size: .72rem; color: var(--ink-soft); text-decoration: none; letter-spacing: .1em; text-transform: uppercase; padding-bottom: 2px; border-bottom: 1px solid transparent; transition: color .2s, border-color .2s; }
  nav a.nav-link:hover { color: var(--accent); border-color: var(--accent); }
  nav a.tg { font-size: .75rem; color: var(--ink-soft); text-decoration: none; letter-spacing: .08em; text-transform: uppercase; padding-bottom: 2px; border-bottom: 1px solid transparent; transition: color .2s, border-color .2s; }
  nav a.tg:hover { color: var(--accent); border-color: var(--accent); }

  /* HERO */
  .hero { padding: 60px 0 0; opacity: 0; animation: fadeUp .7s ease .25s forwards; }
  .hero-inner { position: relative; min-height: 440px; }
  .hero-text { position: relative; z-index: 2; max-width: calc(100% - 200px); }
  .hero-label { font-size: .72rem; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 18px; }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.9rem, 5vw, 2.9rem); font-weight: 400; line-height: 1.15; letter-spacing: -.01em; margin-bottom: 22px; }
  .hero h1 em { font-style: italic; color: var(--accent); }
  .hero-sub { font-size: .98rem; color: var(--ink-soft); line-height: 1.72; }
  .hero-photo { position: absolute; right: 0; top: 30px; width: 260px; z-index: 1; }
  .hero-photo img { width: 100%; aspect-ratio: 3/4; object-fit: cover; object-position: center top; border-radius: 4px; display: block; }

  /* REVIEWS AVATARS */
  .review-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .review-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; object-position: center top; flex-shrink: 0; }
  .review-author { font-size: .74rem; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-soft); }

  /* DIVIDER */
  hr { border: none; border-top: 1px solid var(--line); margin: 0; }

  /* SECTIONS */
  section { padding: 50px 0; opacity: 0; animation: fadeUp .7s ease forwards; }
  section:nth-of-type(1) { animation-delay: .44s; }
  section:nth-of-type(2) { animation-delay: .5s; }
  section:nth-of-type(3) { animation-delay: .56s; }
  section:nth-of-type(4) { animation-delay: .62s; }
  section:nth-of-type(5) { animation-delay: .68s; }

  .section-label { font-size: .7rem; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 28px; }

  /* FOR WHOM */
  .for-whom-item { font-size: 1rem; padding: 15px 0 15px 20px; border-left: 2px solid var(--line); border-bottom: 1px solid var(--line); transition: border-left-color .2s, padding-left .15s; cursor: default; }
  .for-whom-item:last-child { border-bottom: none; }
  .for-whom-item:hover { border-left-color: var(--accent); padding-left: 26px; }

  /* RESULTS */
  .results-intro { font-size: .97rem; color: var(--ink-soft); margin-bottom: 32px; font-style: italic; }
  .result-item { display: grid; grid-template-columns: 28px 1fr; gap: 0 18px; padding: 20px 0; border-bottom: 1px solid var(--line); align-items: start; }
  .result-item:first-of-type { border-top: 1px solid var(--line); }
  .result-num { font-family: 'Playfair Display', serif; font-size: .95rem; color: var(--accent); padding-top: 3px; text-align: right; }
  .result-text { font-size: .97rem; line-height: 1.68; }

  /* ABOUT */
  .about-grid { display: grid; grid-template-columns: 1fr 150px; gap: 36px; align-items: start; }
  .about-text { font-size: .98rem; line-height: 1.78; margin-bottom: 16px; }
  .about-text:last-of-type { margin-bottom: 0; }
  .about-photo img { width: 100%; aspect-ratio: 1/1; object-fit: cover; object-position: center top; border-radius: 2px; }
  .about-facts { margin-top: 28px; display: flex; flex-direction: column; gap: 10px; }
  .fact { display: flex; gap: 14px; font-size: .88rem; color: var(--ink-soft); align-items: baseline; }
  .fact-num { font-family: 'Playfair Display', serif; color: var(--accent); font-size: .92rem; white-space: nowrap; min-width: 32px; text-align: right; }

  /* REVIEWS */
  .review { padding: 0 0 22px; background: transparent; border-radius: 2px; border: none; margin-bottom: 14px; border-bottom: 1px solid var(--line); }
  .review:last-of-type { margin-bottom: 0; border-bottom: none; padding-bottom: 0; }
  .review-text { font-size: .97rem; line-height: 1.72; margin-bottom: 12px; font-style: italic; }
  .review-author { font-size: .74rem; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-soft); }

  .agency-link { color: inherit; text-decoration: none; border-bottom: 1px solid var(--line); padding-bottom: 1px; transition: border-color .2s, color .2s; }
  .agency-link:visited { color: inherit; }
  .agency-link:hover { color: var(--accent); border-color: var(--accent); }

  /* AGENCY */
  .agency-wrap { margin: 0 -24px; }
  .agency-header { padding: 0 24px 28px; }
  .agency-intro { font-size: .97rem; color: var(--ink-soft); line-height: 1.72; margin-top: 8px; }
  .cases-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px; margin-bottom: 28px; }
  .case-item { position: relative; display: block; aspect-ratio: 3/4; overflow: hidden; text-decoration: none; color: #fff; border-radius: 10px; cursor: pointer; }
  .case-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .4s ease; }
  .case-item:hover img { transform: scale(1.04); }
  .case-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,.55) 0%, rgba(0,0,0,.05) 45%, transparent 100%); transition: background .3s ease; }
  .case-item:hover .case-overlay { background: linear-gradient(to bottom, rgba(0,0,0,.6) 0%, rgba(0,0,0,.15) 50%, transparent 100%); }
  .case-body { position: absolute; top: 0; left: 0; right: 0; padding: 16px 14px; }
  .case-tags { font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.75); margin-bottom: 6px; opacity: 0; transform: translateY(-4px); transition: opacity .25s ease, transform .25s ease; }
  .case-item:hover .case-tags { opacity: 1; transform: translateY(0); }
  .case-title { font-size: .82rem; line-height: 1.45; font-weight: 300; }
  .case-item.large { grid-column: span 1; aspect-ratio: 2/3; }
  .cases-footer { padding: 0 24px; }
  .cases-link { font-size: .78rem; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-soft); text-decoration: none; border-bottom: 1px solid var(--line); padding-bottom: 2px; transition: color .2s, border-color .2s; cursor: pointer; }
  .cases-link:hover { color: var(--accent); border-color: var(--accent); }
  @media (max-width: 600px) { .cases-grid { grid-template-columns: 1fr 1fr; } .case-item { aspect-ratio: 2/3; } }


  /* BLOG */
  .blog-scroll { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; height: 400px; scrollbar-width: thin; scrollbar-color: var(--line) transparent; padding-right: 8px; }
  .blog-scroll::-webkit-scrollbar { height: 4px; }
  .blog-scroll::-webkit-scrollbar-track { background: transparent; }
  .blog-scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }
  .post-card { background: transparent; border: none; border-bottom: 1px solid var(--line); padding: 20px 0; display: flex; flex-direction: column; gap: 12px; }
  .post-date { font-size: .68rem; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-soft); }
  .post-text { font-size: .9rem; line-height: 1.65; color: var(--ink); flex: 1; white-space: pre-line; }
  .post-toggle { font-size: .75rem; color: var(--accent); background: none; border: none; padding: 0; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; margin-top: 4px; font-family: 'Spectral', serif; }
  .blog-tg-link { display: inline-block; margin-top: 20px; font-size: .78rem; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-soft); text-decoration: none; border-bottom: 1px solid var(--line); padding-bottom: 2px; transition: color .2s, border-color .2s; cursor: pointer; }
  .blog-tg-link:hover { color: var(--accent); border-color: var(--accent); }

  /* CTA */
  .cta-section { padding: 50px 0 68px; }
  .cta-section h2 { font-family: 'Playfair Display', serif; font-size: clamp(1.55rem, 4vw, 2.15rem); font-weight: 400; line-height: 1.25; margin-bottom: 16px; }
  .cta-section h2 em { font-style: italic; color: var(--accent); }
  .cta-note { font-size: .93rem; color: var(--ink-soft); margin-bottom: 26px; line-height: 1.7; max-width: 460px; }
  .cta-price { font-size: .74rem; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 22px; }
  .cta-price span { color: var(--ink); }
  .btn { display: inline-block; padding: 14px 34px; background: var(--ink); color: var(--bg); text-decoration: none; font-family: 'Spectral', serif; font-size: .88rem; letter-spacing: .04em; transition: background .2s, transform .15s; border-radius: 1px; }
  .btn:hover { background: var(--accent); transform: translateY(-1px); cursor: pointer; }

  /* FOOTER */
  footer { padding: 26px 0 40px; border-top: 1px solid var(--line); }
  footer .wrap { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  .footer-name { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800; letter-spacing: -.01em; color: var(--ink-soft); }
  .footer-links { display: flex; gap: 20px; }
  .footer-links a { font-size: .72rem; letter-spacing: .07em; text-transform: uppercase; color: var(--ink-soft); text-decoration: none; transition: color .2s; }
  .footer-links a:hover { color: var(--accent); }

  /* ANIMATION */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  /* MOBILE */
  @media (max-width: 600px) {
    html { font-size: 16px; }

    .hero { padding: 44px 0 0; }
    .hero-inner { min-height: auto; }
    .hero-text { max-width: 100%; }
    .hero-photo { position: static; width: 100%; margin-top: 24px; }
    .hero h1 { font-size: 2rem; }

    section { padding: 38px 0; }

    .about-grid { grid-template-columns: 1fr; gap: 0; }
    .about-photo { display: none; }

    .review { padding: 16px; }

    .cta-section { padding: 38px 0 56px; }
    .btn { display: block; text-align: center; padding: 16px; }

    footer .wrap { flex-direction: column; align-items: flex-start; gap: 14px; }
  }

  @media (max-width: 380px) {
    html { font-size: 15px; }
  }


  /* BLOG PAGE */
  .blog-header { padding: 52px 0 36px; }
  .blog-header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem,6vw,3rem); font-weight: 400; line-height: 1.1; margin-bottom: 8px; }
  .blog-header .sub { font-size: .87rem; color: var(--ink-soft); }

  .post-list { padding: 0; }
  .post-entry { padding: 24px 0; border-bottom: 1px solid var(--line); }
  .post-entry:first-child { border-top: 1px solid var(--line); }
  .post-entry-date { font-size: .68rem; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 8px; }
  .post-entry-preview { font-size: .95rem; line-height: 1.68; color: var(--ink); white-space: pre-line; }
  .post-entry-toggle { font-size: .75rem; color: var(--accent); background: none; border: none; padding: 0; cursor: pointer; margin-top: 10px; display: block; font-family: 'Spectral', serif; text-decoration: underline; text-underline-offset: 3px; }
</style>
</head>
<body>

<div id="site-header"></div>

<div class="wrap">
  <div class="blog-header">
    <h1>Блог</h1>
    <p class="sub">Посты из Telegram-канала о культуре, управлении и бизнесе</p>
  </div>

  <div class="post-list" id="postList"></div>
</div>

<div id="site-footer"></div>

<script>
const POSTS = [
  {date: `10 April 2026`, text: `Чек-лист как определить свои ценности и встроить их в работу команды

1. Определите свои ценности
Но не придумывайте, а попытайтесь обнаружить через свой реальный опыт.

Посмотрите:
— на что вы опираетесь, когда принимаете сложные решения;
— что для вас важнее: результат, комфорт, деньги, отношения, качество, развитие;
— в каких ситуациях вы чувствуете удовлетворение от работы, а в каких внутреннее напряжение;
— с какими людьми вам легко работать, а с какими — нет;
— за какое поведение вы уважаете коллег, а какое вызывает отторжение.

Эти ценности должны не только помогать комфортно работать друг с другом, но и достигать целей компании. Хороший признак, что ценности ваши — они помогают принимать решения и не требуют дополнительных объяснений. 

2. Четко опишите ценности
Важно не просто зафиксировать ценности, а объяснить, что за ними стоит и как они проявляются в работе: какие действия считаются нормой, а какие — неприемлемы. Иначе каждый будет интерпретировать их по-своему, и они перестанут работать.

Опишите:
— как ценности проявляются в реальных рабочих ситуациях;
— какие конкретные действия им соответствуют;
— какие — считаются нарушением.

Хороший ориентир — можно ли по этой формулировке принять решение: оставить человека, повысить или попрощаться. Если нет, ценность описана слишком размыто.

3. Нанимайте только тех, кто разделяет ваши ценности
Ценности — это главный фильтр. Если человек им не соответствует, это не исправить. Он может какое-то время имитировать соответствие, но в долгосрочной перспективе это все равно проявится. 

Важно смотреть не на слова, а на поведение:
— как человек реагирует на обратную связь;
— как принимает решения;
— что для него действительно важно.

Если он не разделяет ценности, нужно обязательно прощаться.

4. Постоянно подтверждайте ценности своими действиями
Это самый главный и действенный способ поддерживать ценности для руководителя.  

— увольняйте тех, кто им не соответствует;
— нанимайте тех, кто соответствует;
— выбирайте принципы, а не удобство и лояльность.

Руководитель определяет культуру через свои действия. Если слова и действия расходятся, команда ориентируется на действия.`},
  {date: `8 April 2026`, text: `Мы — то, что мы делаем (а не говорим)

Люди не обращают внимание на слова, а обращают внимание на действия. Поэтому когда компания декларирует, что ценности важны, а фактически принимаются решения, не соответствующие им, подтверждается, что необязательно разделять все ценности или какие-то из них, и что это норма. 

Поэтому ценности должны отражать реальность — описывать, что у вас действительно работает на практике и какими принципами руководствуетесь в работе.

Я часто замечал, что делают руководители: они дают защиту всем, хотят быть удобными, чтобы к ним были лояльны. Большинству незрелых руководителей на самом деле не нужны ценности — они выбирают лояльность.

Ценности должен показывать руководитель на уровне решений. Если в компании работают люди с другими ценностями, значит, именно они и являются реальными. 

Я считаю, что хороший способ проверки на соответствие ценностям — дать возможность человеку проявиться. Все сначала показывают себя с лучшей стороны, но это не может длиться вечно. Надо дать человеку расслабиться и посмотреть, какой человек настоящий, чтобы он продемонстрировал, что ему по-настоящему важно.

Дальше поделюсь чек-листом, как определить свои ценности и встроить их в работу команды.`},
  {date: `1 April 2026`, text: `Почти все ценности нашего агентства, о которых я рассказал, были сформулированы в 2009 году и с того момента практически не менялись, со временем только добавилась экологичность. 

Напомню список:
— Здоровое эго
— Командная игра
— Профессионализм
— Экологичность
— Постоянное развитие

По набору этих ценностей можно увидеть, что если работать без них, то это может тормозить компанию. Например, без профессионализма падает планка и страдает качество, без командной игры появляется разрозненность и внутренняя конкуренция. 

Почему ценности именно такие? Я формулировал те, что были для меня самыми важными и могли помогать в принятии решений. Они стали быстрым фильтром, показывающим, соответствует человек ценностям или нет, независимо от его текущих результатов.

При этом я сам несколько раз шел против этого принципа. Я видел, что человек не соответствует ценностям, но в краткосрочной перспективе было проще и быстрее его оставить. Но в ретроспективе всегда такие решения были ошибочными в долгосрочной перспективе. 

Я искренне верю, что когда в команде собираются люди с похожими ценностями, появляется ощущение общности и исчезают внутренние конфликты. Это как в семье: если один живет сегодняшним днем, а другой считает, что нужно жить будущим, им будет тяжело вместе. Они постоянно будут испытывать дискомфорт. У пар с совпадающими ценностями нет таких проблем, сплошная идиллия.

Поделитесь, какие для вас ценности кажутся самыми важными для успеха команды?`},
  {date: `26 March 2026`, text: `Постоянное развитие

Если человек не развивается, это неизбежно приводит к деградации и потере конкурентоспособности. Это касается не только самого человека, но и команды и организации, в которой он работает. 

Развитие проявляется через интерес к опыту из других сфер, поиск новых решений, методов и инструментов. Когда человек изучает новое, он рискует не окупить время и усилия, потраченные на изучение, но только такой путь ведет к росту. 

Сегодня это стало проще: раньше нужно было ходить на курсы и искать наставников, сейчас ИИ сильно упростил доступ к знаниям и поднял планку. Обучаться можно быстрее и практически чему угодно.

Как понять, что человек в команде не развивается? На мой взгляд, есть несколько индикаторов:
— за длительное время ничего не меняется: ни продукты, ни процессы, ни сам человек;
— человек отказывается пробовать новое: держится за статус-кво и защищает привычные подходы;
— на предложения попробовать что-то иначе отвечает «нет», не пытаясь разобраться;

  {date: `19 February 2026`, text: `Сколько стоит ваш перфекционизм

У такого подхода есть характерные признаки. Решения принимаются дольше из-за стремления учесть все детали, делегирование тормозится из-за убеждения, что никто не выполнит задачу на нужном уровне, а запуск проектов откладывается до состояния идеальной готовности. Внутреннее напряжение при этом не снижается даже после достижения цели, потому что планка постоянно повышается.

В команде это проявляется через снижение инициативы и рост осторожности. Люди начинают ориентироваться на ожидания руководителя и избегают экспериментов, поскольку ошибка воспринимается как провал, а не как данные для корректировки курса. Культура постепенно смещается в сторону фасада, где важнее соответствовать стандарту, чем обсуждать реальные ограничения.

Если перфекционизм основан на страхе быть недостаточным, его невозможно «закрыть» новыми достижениями. Требуется пересмотр внутренних правил, которые связывают самооценку с безошибочностью, поскольку именно эта связь создает хроническое напряжение. Ослабление этой зависимости повышает устойчивость и ускоряет принятие решений.

Практически это означает переход к управлению через гипотезы и итерации. Запускать продукт на достаточном уровне готовности и улучшать по фактической обратной связи выгоднее, чем доводить его до воображаемого идеала в изоляции от рынка. Публичный разбор собственных управленческих ошибок формирует культуру обучения и снижает страх в системе.

Высокие стандарты остаются важными, однако они должны опираться на стратегию и данные, а не на внутренний стыд. Когда ценность руководителя не зависит от безупречного результата, появляется пространство для роста, масштабирования и долгосрочной устойчивости.`},
  {date: `17 February 2026`, text: `Энергия лидера
Важные качества лидера, #7

Когда у лидера нет энергии, само лидерство пропадает, потому что лидерство — это всегда движение: к целям, к чему-то лучшему, а движение без энергии невозможно. Лидеру нельзя перегорать, потому что это плохо влияет на работу, и ему важно быть стойким, потому что это его ответственность. Сразу это не дается, этому нужно постепенно учиться и тренироваться.

Есть четыре типа энергии: физическая, ментальная, эмоциональная и духовная. Если на каком-то из этих уровней есть проблема, то энергия не будет максимальной. 

Физическая — держать себя в тонусе. Психологическая — то, о чем ты думаешь: как интерпретируешь происходящее, на чем держишь фокус и какие мысли постоянно прокручиваешь. Эмоциональная: любой негатив (раздражение, нетерпение) тратит энергию, а позитив, наоборот, добавляет. Духовная — смысл. Нет полной энергии, когда не понимаешь, в чем смысл того, что ты делаешь. 

Думаю, многие согласятся, что рабочем дне есть до четырех творческих часов, когда ты можешь максимально творчески решать задачи. Остальное время — переключения между ними, встречи и рабочая рутина вроде проверки почты и ответы на сообщения.

Чтобы хватало энергии на эти четыре часа, к ним нужно заранее готовиться: убирать все, что ее забирает. Сложно сохранять энергию, если есть конфликты в семье или гнетущее внутреннее состояние вроде потери смысла и одиночества. Важно избавляться от источников потерь, накапливать энергию и осознанно тратить ее на движение вперед и достижение целей.

Лидеру нельзя сдаваться во время кризисов и ударов: важно первым преодолевать психологические сложности, меняться, нащупывать новый вектор и с энтузиазмом двигаться вперед, вовлекая других.

  {date: `13 February 2026`, text: `Гибкость
Важные качества лидера, #6

Зачастую для руководителей пойти навстречу считается слабостью, делать уступки – тоже. Но отсутствие гибкости приводит в тупик: что в межличностных отношениях и культуре, что в стратегии на рынке. 

Быть гибким — уметь менять свою позицию и учитывать другие точки зрения. Это умение слышать, рассматривать альтернативы и при необходимости пересматривать собственное решение.

Что мешает гибкости? 
— Отсутствие скромности. Если ты меняешь свою позицию, значит надо признать, что ты был не прав, а это удар по эго. 
— Страх потерять авторитет. Многие думают, что если ты признаешь, что был не прав, значит это делает тебя слабее в чужих глазах. Если ты ошибся один раз, это может случиться снова, и руководители боятся показать слабость.

Как проявлять гибкость, если ты уверен, что прав? Я стараюсь первым проявлять гибкость в незначительных вопросах. Если есть две позиции и вопрос не критичный, я даю человеку возможность реализовать свое решение и получить собственный опыт. Даже если я считаю, что оно не сработает, иногда важнее, чтобы человек сам увидел результат.

Когда опыт получен и последствия становятся понятны, к разговору можно вернуться. В этот момент человек уже иначе воспринимает альтернативную точку зрения, и появляется пространство для пересмотра решения. Со временем это формирует взаимность: человек чаще готов учитывать и твою позицию.

При этом в важных и приоритетных вопросах я могу настоять. Гибкость в мелком позволяет сохранить доверие и использовать его тогда, когда решение действительно имеет стратегическое значение.

Гибкость — прежде всего черта зрелого человека, а ее отсутствие мешает строить отношения взаимного доверия и уважения, которые мы обсуждали ранее.

  {date: `11 February 2026`, text: `Стратегическое мышление
Важные качества лидера, #5

Стратегическое мышление — это долгосрочное мышление, и я убежден, что крайне важно, чтобы лидер им обладал (подробнее о том, что такое стратегическое мышление, я рассказывал в одной из заметок). 

Но почему же оно так важно? Выдающихся результатов можно добиться только в долгосрочной перспективе, а без понимания, куда ты хочешь прийти, роста не будет. Без стратегического мышления невозможно принимать решения, которые в долгосрочной перспективе будут более результативными и эффективными. 

Тактическое чутье и таланты не перекроют того, что может дать долгосрочный вектор. Когда можно сказать, что лидер обладает стратегическим мышлением? Когда умеет говорить «нет» неприоритетным возможностям. 
 
Для меня стратегия — это не большой детализированный план со множеством пунктов. Такие планы редко работают: реальность обычно развивается не так, как ты ожидаешь, и приходится постоянно подгонять ее под заранее придуманный сценарий. 

Поэтому я считаю более важным иметь несколько ключевых приоритетов или ориентиров. Например, простая и универсальная стратегия — выстроить поток новых людей и регулярно отбирать сильных и прощаться со слабыми (о чем мы недавно говорили). 

Но расслабляться никогда нельзя, даже, когда вам кажется, что вы достигли желаемого уровня. Любая система подвержена энтропии, а значит со временем деградирует. Поэтому стратегическое мышление для лидера —  это постоянная работа: ежедневное внимание к ключевым приоритетам и готовность снова и снова сверяться с ними в решениях.

  {date: `20 January 2026`, text: `Я много писал о важности прямоты и обратной связи в культуре, и рад видеть, что не один так думаю. Вот хороший пост от Дениса Ломова, CEO Red Collar, где сформулировано, почему честный фидбек в команде не возникает сам по себе и требует осознанной работы.`},
  {date: `20 January 2026`, text: `Честная обратная связь - это роскошь

  {date: `15 January 2026`, text: `Эго — это враг
11/50, культура, лидерство

Тему деструктивного влияния эго на культуру и бизнес для меня еще давно открыл Коллинз. Он приводил множество примеров, где компании теряли устойчивость не из-за рынка или стратегии, а потому что в центре решений оказывалось эго руководителя.

Поэтому мне было особенно интересно изучить эту тему глубже, к тому же, ее написал один из моих любимых авторов. По сути, это попытка с другой стороны разобрать ту же проблему: что происходит, когда чувство собственной значимости начинает мешать видеть реальность.

Эта тема напрямую связана с предыдущим постом, эго — один из главных факторов, который ломает сотрудничество. Когда вместе работают сильные люди с разными взглядами, различия неизбежны. Но именно эго превращает разницу мнений в конфликт, а конфликт — в отказ работать друг с другом.

В этот момент люди перестают искать решения и начинают защищать позиции. Совместный выигрыш перестает быть целью. В итоге проигрывают все — команда, продукт, бизнес.

Мне важно, чтобы в культуре этого было как можно меньше, хотя это сложно. Особенно в среде сильных, умных, самостоятельных людей. Эго проявляется в спорах, в нежелании уступить, в убежденности, что «я вижу ситуацию лучше».

Книга хорошо напоминает простую вещь: эго почти всегда мешает. Оно искажает реальность, делает обратную связь бесполезной, ломает сотрудничество и особенно опасно в кризисе. 

Противоядие у автора одно — смирение и скромность. Это практический навык, который надо развивать: ставить результат выше собственного эго.

В карточках, как обычно, самые полезные мысли из книги.

  {date: `23 April 2025`, text: `ВкусВилл

Кстати, с автором этой книги — Евгением Щепиным мы записали очень интересный выпуск подкаста Мышеловка — слушать.

#книги`},
  {date: `10 April 2025`, text: `Открывая организации будущего
5/50, культура, стратегия

Продолжаю серию из 100 книг, которые сильнее всего повлияли на меня и на работу агентства. Эта книга — одна из самых значимых. Она не просто вдохновила, а укрепила вектор нашего развития и стиля управления. 

После Джима Коллинза, который доказал на примерах, что децентрализация эффективнее иерархии, я стал направлять агентство в сторону самоуправления. А потом прочитал Лалу — и получил подтверждение, что мы на правильном пути. После неё мы пошли ещё глубже.

Мы начали сокращать контроль, давать больше свободы в принятии решений. Можно было не приходить в офис, работать из дома и по своему графику (это было задолго до пандемии). Когда позже перешли полностью на удалёнку, опора на принципы самоорганизации помогла сделать это спокойно — с доверием.

Сейчас это наш способ жизни и работы. Я даже не представляю, как можно иначе. Роль лидера для меня — не управлять и контролировать, а создавать среду, где люди раскрываются.

В карточках собрал самые полезные идеи из книги.

#книги`},
  {date: `11 January 2025`, text: `Рефлексия по 2024

За прошлый год мы сильно изменились, особенно в культуре.
Я долго стремился вести агентство к командам, состоящим исключительно из A-игроков (чтобы быть лучшими для наших клиентов), но этому мешала некая двойственность. У меня был партнёр несколько с другими целями и ценностями, который своим примером создавал параллельную культуру. В начале 2024 года мы попрощались, и агентство стало продвигаться к новой, более конкурентоспособной культуре. Расскажу немного о нескольких наших изменениях.

Обновили управляющую команду
Управляющая команда выросла до 10 человек: добавились финансовый менеджер и HR. Полностью обновились тимлидеры аккаунтов и проджектов. Наполовину обновилась команда продакт-менеджеров (у нас четыре продукта: стратегия, перфоманс, брендинг и сайты).

HR
Отдельно хочу рассказать о нашем новом HR. Это наш самый сильный HR за всё время. За четыре месяца она (вместе с новыми тим-лидерами) закрыла все открытые вакансии, включая позиции, которые мы не могли закрыть очень долгое время (например, новых аккаунтов мы искали почти год). HR — это крайне важный игрок в команде, так как он должен лучше всех понимать и разделять ценности компании, чтобы нанимать таких же людей.

Аккаунты
С точки зрения роста результатов команда аккаунтов играет ключевую роль. В 2024 году она обновилась на 70%: команду покинули шесть человек, а мы взяли четырёх сильных новеньких. Потенциал обновлённой команды чувствуется в несколько раз выше, чем в начале года.

Актуализировали ценности
Мы подробно описали наши основные четыре ценности (здоровое эго, командная игра, профессионализм, постоянное развитие) и добавили новую ценность — экологичность. В каждую из них включили конкретные рекомендации, как лучше им соответствовать.

Теперь мы акцентируем внимание на том, что стремимся быть лучшими для наших клиентов. А для этого в нашей команде мы хотим видеть только самых сильных игроков на каждой позиции, полностью разделяющих наши ценности.

Пересматриваем миссию/цель
Со времён моей молодости и романтизма у нас была сформулирована высокая цель — делать мир лучше, развивая маркетинг. Мы проводили яркие бизнес-конференции Digitale (одна из них так и называлась «Меняй мир»), организовывали Школу маркетинга и регулярные семинары, выращивали стажеров.

Но, общаясь в последнее время с самыми результативными ребятами, я заметил, что фокус на стремлении менять мир их не привлекает. Их интересуют высокие результаты. И что ещё важнее: сильные игроки хотят работать только с сильными.

Середнячков же, которые не стремились к высоким результатам, привлекало быть частью команды, которая ставит себе романтичные цели. 

Теперь наша большая цель трансформируется в маленькую: вместо изменения мира мы сосредотачиваемся на себе и наших клиентах. Мы стремимся быть командой, где сильные и амбициозные игроки максимально раскрывают свой потенциал и вдохновляют друг друга высокими результатами. Но я верю, что эта «маленькая» цель меняет мир сильнее — через реальные результаты: создание среды для развития сильных игроков и высокий уровень сервиса для наших клиентов.`},
  {date: `30 August 2024`, text: `В завершение разговора о Darkrain, делюсь интервью с нашей командой, которая ежедневно работает над проектом. 

Darkrain
5/5, Что команда Serenity ценит в работе с клиентом сильнее всего

Ребята рассказали, почему Darkrain — это особенный проект, как у нас строится внутреннее взаимодействие с командой заказчика и почему мы считаем этот бренд крутым.

Читайте наш разговор в карточках.

А чтобы подробнее узнать про этот кейс, переходите к предыдущим постам:

— 1/5, история нашей работы с Darkrain
— 2/5, как мы справляемся со сложностями и неудачами
— 3/5, что помогает нам достигать крутых результатов
— 4/5, принципы, которые помогают сотрудничать с клиентом многие годы

Познакомиться с результатами нашей работы можно в кейсе.

  {date: `10 July 2024`, text: `Ищем активных аккаунт-менеджеров и проджектов в Serenity.

Обычно в вакансиях мы пишем, что у нас большой поток теплых входящих заявок и можно выбирать проекты, которые действительно нравятся. Так вот сейчас это как никогда правда.

Очень ждем пополнение в команде. Поэтому, если знаете, с кем поделиться — отправляйте.

Коротко о Serenity:

— У нас нет отделов и иерархии.

— Работаем в формате проектной занятости, поэтому каждый управляет своей загрузкой, графиком и доходом.

— Задачи и внутренние команды формируются индивидуально под каждый проект, чтобы каждому было комфортно проявляться.

— А еще наша команда путешествует по всему миру, потому что мы полностью отказались от офиса.

Отклики на вакансии отправляйте нашему HR-менеджеру на hh:
Аккаунт-менеджер
Проджект-менеджер по performance-маркетингу`},
  {date: `14 March 2024`, text: `Или вы организация, управляемая одним человеком, или вы живая организация.`},
  {date: `30 June 2023`, text: `Второй выпуск нашего подкаста «Мышеловки» с автором очень крутой книги о «Вкусвилл» Евгением Щепиным.`},
  {date: `17 February 2023`, text: `Я не писал здесь последние полгода, потому что активно занимался разработкой нашего стартапа (сервис для командной работы). Стратегия — это выбор, во что вкладывать ресурсы, поэтому выбор был в пользу сервиса. Но душа просит делиться знаниями и опытом, поэтому решил выделить дополнительно несколько часов в неделю на этот канал.

Он по-прежнему будет посвящен исследованию и классификации существенных конкурентных преимуществ.

Вспомним, какие уже обсудили:
— Культура (кстати, не так давно рассказал о важности культуры в кризисное время в подкасте)
— Дизайн и простота
— Снижения рисков и издержек, выгода и безопасность

В дальнейшем также буду делиться опытом создания и вывода на мировой рынок нашего сервиса, обладающего существенными преимуществами, о которых мы говорим здесь.`},
  {date: `4 February 2022`, text: `Простота на уровне коммуникаций

1. Часто у брендов меняются креативные кампании (вместе с агентствами, о чем я говорил тут), и так как они несут разные посылы, то сложно запомнить основные ценности компании.  

2. Когда в продукте много преимуществ, хочется рассказать обо всех. Но из-за этого людям сложно осознать главное и понять суть, все размывается.

3. Каждый день на человека сваливается огромное количество посланий от брендов, и чтобы хоть как-то справиться с этим, организм выработал механизм игнорирования информации. Поэтому мы воспринимаем только крохотную часть того, что бренды пытаются донести.

Как брендам справиться с этими проблемами? 

Надо быть проще. До той частички внимания, которую потребитель готов уделить бренду, необходимо максимально просто донести основную мысль.

У продуктов Apple много преимуществ, но они выбирают одну простую идею, которую доносят до потребителей. Помните наружную рекламную кампанию iPhone с очень красивыми и качественными фотографиями и простой надписью: «Снято на iPhone»? Отличный пример простоты коммуникации. 

Когда Apple хотят рассказать о других преимуществах, например о функции Face ID, они снимают отдельный рекламный ролик только об этом.

Многие бренды разговаривают с аудиторией на понятном себе языке, а не на языке потребителя. Когда все говорили, что их плееры на 256 Мб, Apple говорили, что их плееры на 1000 песен.`},
  {date: `13 December 2021`, text: `Простота 

Простота — такое же сильное преимущество как и дизайн (они связаны). Хороший дизайн стремится к простоте. Простота стремится к хорошему дизайну. Так же как и с дизайном, простоту мало кто использует как стратегию. Давайте рассмотрим понятие простоты шире. 

Во всем живом есть врожденная способность выбирать путь наименьшего сопротивления, чтобы тратить меньше энергии и ресурсов. Мы стремимся минимизировать средства и усилия для достижения целей. 

С другой стороны, мир постоянно усложняется: появляются новые технологии, дисциплины расщепляются на более мелкие. Людям трудно мыслить просто. Но мы любим простые вещи, потому что нашему мозгу легче их воспринимать, так как ему не приходится прилагать усилия. Жизнь очень сложная, а простота так редко встречается. Мы ценим и быстро привыкаем к тому, что облегчает нашу жизнь.

По умолчанию все выходит сложным, и нужно сильно постараться, чтобы добиться простоты. 

Отличной визуализацией примера, как люди тянутся к простоте, будет книжный магазин Morioka Shoten Ginza в Японии. Они выбрали концепцию продажи всего одной книги, которую меняют каждую неделю. Это интересно, необычно, радикально, а главное — просто. Все тиражи распродаются, и людям не нужно выбирать из множества книг какую купить — выбор максимально упрощен.

В ближайших постах рассмотрим, как простота может помочь добиться преимущества на уровне стратегии, продуктов, коммуникации и культуры.`},
  {date: `6 December 2021`, text: `Завершая тему с дизайном, хочется поделиться несколькими идеями из книги, которая у меня ассоциируется с этой темой — «Безумно просто» от маркетолога компании Chiat/Day, которая долго сотрудничала с Apple.

— Chiat/Day также работало и с Intel, но реклама Apple вызывала эмоциональный отклик, а реклама Intel нет. Apple ориентировалась на свое дизайн-мышление, а Intel на цифры и исследования. 

К тому же, у Intel в тестировании и принятии решений участвовало много людей, и они старались срезать острые углы в угоду всем целевым группам. Apple же работала маленькими умными командами (два человека от Apple и два человека от Chiat/Day). Как ни старалось Chiat/Day сделать что-то сильное, как у Apple, у них не было шанса из-за большого количества людей, которые принимали участие в решениях, а также из-за отсутствия развитого дизайн-мышления внутри Intel. 

— Apple около тридцати лет работала с одним рекламным агентством, а многие бренды ежегодно устраивают тендеры и регулярно меняют подрядчиков. Chiat/Day глубоко участвовало в процессах Apple и сильно влияло на них. Например, Джобс хотел назвать свой настольный компьютер MacMan, но автор книги предложил название iMac и упорно переубеждал Джобса, пока тот не согласился.

Так как они хорошо понимали друг друга и философию бренда, вместе они смогли придумать много классный идей, например, концепцию Think Different, которая помогла спасти Apple от банкротства.

Если часто менять агентство, то не установится тесной связи, не будет глубокого взаимопонимания. Долгосрочное сотрудничество дает плоды.`},
  {date: `7 June 2021`, text: `Ранее я рассказывал про самоорганизацию в найме сотрудников. У нас команда решает не только, кто из новеньких остается, но и с кем нужно расстаться. 

Уже три года мы проводим квартальную оценку в виде игры (о ней можно прочитать в нашем блоге). У всех есть информация, кого как оценивают. Игра стала нашим инструментом по постоянному освобождению от неэффективных членов команды. 

Сложилось так, что мы очень редко увольняем людей. Если человек получает низкую оценку, то либо он что-то пытается изменить, либо понимает, что не подходит и уходит сам. Если этого не происходит долгое время (несколько кварталов подряд), то кто-то из управляющей команды уже инициирует расставание.

В текущей оценке есть и проблема: сейчас система предлагает всем оценить всех, но многие друг друга не знают, так как у нас большой штат специалистов с разных городов. Поэтому приходится тратить время на пропуск оценки тех, с кем человек не взаимодействовал. Иногда кто-то ставит высокие оценки просто за симпатию или чтобы поддержать коллегу, даже если не работал с ним в проекте.

Мы решили переосознать обратную связь и подумали, что будет круто, когда тебя оценивают только те, с кем ты работал. Если не хочешь оценивать, не оцениваешь. И ты получаешь регулярную обратную связь от тех, с кем работаешь в проектах, а не от тех, кто про тебя ничего не знает. 

Оценка происходит не раз в квартал, а по каждому проекту индивидуально: если проект разовый, то оценка начинается, когда проект завершается, или регулярно, если проект ежемесячный — это можно гибко менять в настройках проекта. Оценка видна в режиме реального времени с актуальной обратной связью. Люди в разделе «Команда» сортируются по своему среднему баллу. 

Людям сложно решиться высказать обратную связь, но это становится легче, когда тебя об этом регулярно спрашивают. 

На картинке ниже можно посмотреть, как это будет выглядеть. 

В процессе создания сервиса пришла идея, как в будущем нам вообще обойтись без увольнений. Система не будет давать возможность добавить человека в проект, если у него низкая оценка, и мы плавно перестанем работать. Никому не придется принимать это сложное решение, это сделает система.`},
  {date: `26 May 2021`, text: `В самоорганизованных организациях у гайдов важная роль, потому что все полагаются на самостоятельность в получении знаний. 

Так как самоорганизация основана на самостоятельности, в том числе и в обучении, то гайды и инструкции должны быть крутыми, чтобы ими было приятно пользоваться. Мы пересмотрели много сервисов, которые структурируют базу знаний, но на рынке ничего подходящего не нашли, поэтому решили создать свой сервис — Pulse, о котором я упоминал в заметке про большие цели. 

Какой, на наш взгляд, должна быть хорошая база знаний?
— Красивый дизайн. Обычно инструкции большие, в редакторе есть много лишних функций, нет единого, простого и лаконичного оформления, и, как правило, это некрасиво. Со временем база знаний разрастается, становится неудобной и нефункциональной. Красиво и просто оформленные гайды приятнее читать, и информация запоминается лучше. У людей не возникает желания “забить” на изучение. 
— Отображение только для вашей роли. В обычных базах знаний человек видит весь список гайдов, в которых можно запутаться. Намного легче искать информацию, когда ты видишь только ту информацию, которая нужна конкретно для твоей должности. 
— Простая навигация. Важно структурировать информацию, но иногда из-за большой вложенности трудно найти то, что тебе нужно. Категоризаций гайдов должна быть простой и понятной.

Немного подробнее о нашем сервисе на картинках ниже.`},
  {date: `14 April 2021`, text: `Рассказав про Digitale «Меняй Мир», захотелось вспомнить про еще одну тему нашей конференции — счастье. Счастье — это не только цель жизни, а также важная составляющая сильной корпоративной культуры.

Когда человек счастлив, он более продуктивен — это подтверждено множеством исследований. Поэтому я убежден, что нужно создавать все условия для того, чтобы люди в команде чувствовали себя счастливыми. 

Вот два примера успешных моделей бизнеса, которые нацелены на счастье:

— Zappos. Они удивляют и поражают клиентов искренним сервисом. Компания нанимает людей с целью делать клиентов счастливыми. Это дает сотрудникам смысл жизни. 
— Southwest Airlines. Они делают сотрудников счастливыми, потому что только такие люди могут дарить клиентам счастье. Они создали классную семейную атмосферу, где все поддерживают друг друга.

const LIMIT = 400;
const list = document.getElementById('postList');

POSTS.forEach(p => {
  const entry = document.createElement('div');
  entry.className = 'post-entry';

  const dateEl = document.createElement('div');
  dateEl.className = 'post-entry-date';
  dateEl.textContent = p.date;

  const textEl = document.createElement('div');
  textEl.className = 'post-entry-preview';
  const isLong = p.text.length > LIMIT;
  let expanded = false;
  textEl.textContent = isLong ? p.text.slice(0, LIMIT) + '…' : p.text;

  entry.appendChild(dateEl);
  entry.appendChild(textEl);

  if (isLong) {
    const btn = document.createElement('button');
    btn.className = 'post-entry-toggle';
    btn.textContent = 'Читать полностью';
    btn.onclick = () => {
      expanded = !expanded;
      textEl.textContent = expanded ? p.text : p.text.slice(0, LIMIT) + '…';
      btn.textContent = expanded ? 'Свернуть' : 'Читать полностью';
    };
    entry.appendChild(btn);
  }

  list.appendChild(entry);
});
</script>
